version: '3.9'

# Production Docker Compose for Cr4ck
# Database is hosted on Supabase — no local DB service needed.
# Usage:
#   1. Copy api/.env.prod.example → api/.env.prod and fill in all values (including Supabase DATABASE_URL)
#   2. Build the Angular app:  cd ui && npm run build -- --configuration production
#   3. Place TLS certs in ./certs/fullchain.pem and ./certs/privkey.pem
#   4. docker compose -f docker-compose.prod.yml up -d

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./api/.env.prod
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ui/dist/ui/browser:/usr/share/nginx/html:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
