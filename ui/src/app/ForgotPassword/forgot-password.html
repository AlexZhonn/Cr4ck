<div class="auth-root">
  <app-header></app-header>

  <main class="auth-container">
    <div class="auth-card">
      @if (!submitted) {
        <div class="auth-card-header">
          <h1 class="auth-title">Forgot password?</h1>
          <p class="auth-subtitle">Enter your email and we'll send a reset link.</p>
        </div>

        <form class="auth-form" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              [(ngModel)]="email"
              placeholder="name@domain.com"
              required
            />
          </div>

          <button type="submit" class="btn-submit" [disabled]="isLoading || !email">
            {{ isLoading ? 'Sending...' : 'Send reset link' }}
          </button>
        </form>
      } @else {
        <div class="state-success">
          <div class="icon-circle">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="28"
              height="28"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <h1>Check your inbox</h1>
          <p>
            If an account with that email exists, we've sent a reset link. It expires in 1 hour.
          </p>
        </div>
      }

      <footer class="auth-footer">
        <p><a routerLink="/login" class="accent-link">Back to login</a></p>
      </footer>
    </div>
  </main>
</div>
