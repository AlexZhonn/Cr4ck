<div class="auth-root">
  <app-header></app-header>

  <main class="auth-container">
    <div class="auth-card">

      @if (state === 'form') {
        <div class="auth-card-header">
          <h1 class="auth-title">Set new password</h1>
          <p class="auth-subtitle">Must be at least 8 characters.</p>
        </div>

        <form class="auth-form" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <div class="label-row">
              <label for="password">New password</label>
              <button type="button" class="view-toggle" (click)="showPassword = !showPassword" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
                {{ showPassword ? 'Hide' : 'Show' }}
              </button>
            </div>
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              name="password"
              [(ngModel)]="password"
              placeholder="••••••••"
              minlength="8"
              required
            />
          </div>

          <button type="submit" class="btn-submit" [disabled]="isLoading || password.length < 8">
            {{ isLoading ? 'Saving...' : 'Reset password' }}
          </button>
        </form>
      }

      @if (state === 'success') {
        <div class="state-success">
          <div class="icon-circle success">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <h1>Password updated</h1>
          <p>Your password has been reset. You can now log in.</p>
          <button type="button" class="btn-primary" (click)="goLogin()">Go to login</button>
        </div>
      }

      @if (state === 'error') {
        <div class="state-error">
          <div class="icon-circle error">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </div>
          <h1>Link expired</h1>
          <p>{{ errorMessage }}</p>
          <a routerLink="/forgot-password" class="btn-primary">Request a new link</a>
        </div>
      }

    </div>
  </main>
</div>
