name: Security scan

on:
  pull_request:
    branches: [main]
  schedule:
    # Every Monday at 08:00 UTC — catches newly disclosed CVEs between PRs
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  python-audit:
    name: Python — pip-audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r api/requirements.txt

  node-audit:
    name: Node — npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit Node dependencies
        # --audit-level=high: only fail on high/critical; moderate vulns are reported but don't block
        run: npm audit --audit-level=high
